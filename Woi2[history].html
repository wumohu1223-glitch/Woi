<!DOCTYPE html>

        .word-title { font-size: 36px; margin: 15px 0; font-weight: bold; color: #000; font-family: 'Georgia', serif; }
        .preview-box { background: #f9f9f9; padding: 15px; border-radius: 8px; margin: 10px 0; border: 1px solid #eee; }
        .quiz-prompt { font-size: 24px; color: #2980b9; background: #ebf5fb; padding: 20px; border-radius: 8px; margin: 20px 0; border-left: 5px solid #3498db; }
        .answer-reveal { background: #e8f8f5; padding: 20px; border-radius: 8px; margin-top: 15px; border: 1px solid #1abc9c; }
        
        .diff-container { margin: 10px 0; padding: 15px; background: #fff; border: 1px solid #ddd; border-radius: 8px; font-family: 'Consolas', 'Courier New', monospace; font-size: 18px; word-break: break-all; min-height: 1.5em; }
        .diff-wrong { color: var(--danger); text-decoration: underline; font-weight: bold; }
        .diff-normal { color: #2c3e50; }

        /* 移动端操作区 */
        .mobile-actions { display: none; flex-direction: column; gap: 10px; margin-top: 20px; }
        @media (max-width: 768px) {
            .mobile-actions { display: flex; }

            .nav button { padding: 8px; font-size: 13px; }

<!-- 
===============================================
SUPABASE 数据库表结构说明
===============================================

需要在 Supabase 中创建以下表格：

1. vocab_words - 英语词汇表
   - id: uuid (primary key)
   - user_id: uuid (默认 '00000000-0000-0000-0000-000000000000')
   - word: text (单词)
   - orig_jp: text (原文句子)
   - gen_jp: text (生成句子/例句)
   - orig_cn: text (原文翻译)
   - gen_cn: text (生成翻译/例句翻译)
   - status: text (状态: new/review/relearn/mastered)
   - next_time: timestamptz (下次复习时间)
   - review_count: integer (复习次数)
   - deleted: boolean (是否删除)
   - created_at: timestamptz

2. vocab_gois - 日语词汇表（结构与vocab_words完全相同）
   - id: uuid (primary key)
   - user_id: uuid
   - word: text (日语单词)
   - orig_jp: text (原文句子)
   - gen_jp: text (生成句子)
   - orig_cn: text (原文翻译)
   - gen_cn: text (生成翻译)
   - status: text
   - next_time: timestamptz
   - review_count: integer
   - deleted: boolean
   - created_at: timestamptz

3. learning_resources - 学习资源表
   - id: uuid (primary key)
   - user_id: uuid
   - lang: text (语言: 'en' 或 'ja')
   - name: text (资源名称)
   - url: text (资源链接)
   - created_at: timestamptz

4. ai_prompts - AI提示词表
   - id: uuid (primary key)
   - user_id: uuid
   - lang: text (语言: 'en' 或 'ja')
   - prompt_text: text (提示词内容)
   - updated_at: timestamptz

===============================================
-->

<!-- 语言切换器 -->
<div class="lang-switcher">
    <span id="lang-label">开始学习：</span>
    <button class="lang-btn" id="btn-en" onclick="switchLang('en')">English</button>
    <button class="lang-btn" id="btn-ja" onclick="switchLang('ja')">日本語</button>
</div>

<div class="container">
    <div class="nav">
        <button id="nav-learn" class="active" onclick="showPanel('learn')">📖 <span class="nav-text-learn">背诵模式</span></button>
        <button id="nav-add" onclick="showPanel('add')">📥 <span class="nav-text-import">导入与资源</span></button>

        <div class="stat-box"><span class="stat-label-rel">再复习</span> <br><b id="stat-rel">0/0</b></div>
    </div>

    <div id="panel-learn" class="panel">

        <div class="mobile-actions">
            <button class="btn-main-action" onclick="handleNext()"><span class="btn-text-next">确定 / 下一步 (Enter)</span></button>
            <div class="btn-sub-group">
                <button class="btn-sub-action" style="background:#95a5a6" onclick="session.phase='PREVIEW'; session.lastInput=''; renderQuiz();"><span class="btn-text-retry">重来 (Ctrl+Z)</span></button>
                <button class="btn-sub-action" style="background:#34495e" onclick="handleEdit()"><span class="btn-text-edit">修改 (Tab)</span></button>
            </div>
        </div>

        <div style="text-align:center; color:#888; margin-top: 15px;" class="shortcut-hint">
            <kbd>Tab</kbd> <span class="hint-edit">编辑</span> | <kbd>Enter</kbd> <span class="hint-next">下一步</span> | <kbd>Space</kbd> <span class="hint-retry">记错重来</span> | <kbd>Delete</kbd> <span class="hint-delete">永久删除</span>
        </div>
    </div>

    <div id="panel-add" class="panel hidden">
        <div class="card">
            <h3 class="resource-title">🔗 学习资源</h3>
            <div id="link-list" style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px;"></div>
            <div style="display:flex; gap:5px; margin-bottom:20px;">
                <input type="text" id="link-name" placeholder="资源名" style="flex:1; padding:8px;">
                <input type="text" id="link-url" placeholder="网址" style="flex:2; padding:8px;">
                <button onclick="addLink()" class="btn-action btn-primary btn-text-add">添加</button>
            </div>

            <h3 class="prompt-title">🔥 AI 提示词</h3>
            <textarea id="prompt-content" class="prompt-text"></textarea>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="btn-action btn-text-save-prompt" onclick="savePrompt()">保存提示词</button>
                <button class="btn-action btn-primary btn-text-copy" onclick="copyPrompt(event)">一键复制</button>
            </div>

            <h3 style="margin-top:25px;" class="import-title">📥 新词导入</h3>
            <textarea id="import-area" style="width:100%; height:100px; padding:10px; box-sizing:border-box;" placeholder="粘贴 AI 生成的内容..."></textarea>
            <button onclick="showImportConfirm()" class="btn-action btn-primary btn-text-import-btn" style="width:100%; margin-top:10px;">解析并导入</button>

            <h3 style="margin-top:25px;" class="settings-title">⚙️ 目标与备份</h3>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-bottom:10px;">
                <div><span class="label-new">新词:</span> <input type="number" id="set-new" value="10" style="width:50px" onchange="settings.new=parseInt(this.value);save();"></div>
                <div><span class="label-rev">复习:</span> <input type="number" id="set-rev" value="20" style="width:50px" onchange="settings.rev=parseInt(this.value);save();"></div>
                <div><span class="label-rel">再复习:</span> <input type="number" id="set-rel" value="30" style="width:50px" onchange="settings.rel=parseInt(this.value);save();"></div>
            </div>
            <button class="btn-action btn-primary btn-text-export" onclick="exportData()">备份 JSON</button>
            <button class="btn-action btn-text-restore" onclick="document.getElementById('fileInput').click()">恢复备份</button>
            <input type="file" id="fileInput" class="hidden" accept=".json" onchange="importData(event)">
        </div>
    </div>

    <div id="panel-lib" class="panel hidden">
        <div class="card">
            <h3 class="lib-title">🗃️ 词库管理 <button class="btn-action btn-danger btn-text-clear" onclick="clearAllData()" style="float:right; font-size:12px;">清空全部</button></h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th class="th-word">单词/音标</th>
                            <th class="th-orig">原文句</th>
                            <th class="th-orig-trans">原翻</th>
                            <th class="th-gen">生成句</th>
                            <th class="th-gen-trans">生翻</th>
                            <th class="th-action">操作</th>
                        </tr>
                    </thead>
                    <tbody id="lib-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 导入确认对话框 -->
<div id="import-confirm-modal" class="confirm-modal">
    <div class="confirm-box">
        <h3 class="confirm-title">确认导入</h3>
        <div class="confirm-stats">
            <div><span class="confirm-ja-label">日文单词：</span><span class="ja-count" id="confirm-ja-count">0 个</span></div>

            <div style="border-top: 1px solid #ddd; margin-top: 10px; padding-top: 10px;">
                <span class="confirm-total-label">总计：</span><span id="confirm-total-count" style="font-weight: bold;">0 个</span>
            </div>
        </div>
        <p class="confirm-hint" style="color: #666; font-size: 14px;">确认要将这些单词导入到相应的词库吗？</p>
        <div class="confirm-buttons">
            <button class="btn-cancel btn-text-cancel" onclick="hideImportConfirm()">取消</button>
            <button class="btn-confirm btn-text-confirm" onclick="confirmImport()">确认导入</button>
        </div>
    </div>
</div>

    // 判断单词语言类型
    function detectWordLanguage(word) {
        // 检测日文（平假名、片假名、汉字）
        if (/[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FAF]/.test(word)) {
            return 'ja';
        }
        return 'en';
    }

    // 获取当前语言对应的表名
    function getTableName(lang) {
        return lang === 'ja' ? 'vocab_gois' : 'vocab_words';
    }

    // Supabase 数据库操作
    const DB = {
        headers: { 
            "apikey": SUB_KEY, 
            "Authorization": "Bearer " + SUB_KEY, 
            "Content-Type": "application/json", 
            "Prefer": "return=representation" 
        },
        async select(table, filter = "") {
            const url = `${SUB_URL}/rest/v1/${table}?${filter}&select=*`;
            const r = await fetch(url, { headers: this.headers });
            if (!r.ok) throw new Error(await r.text());
            return r.json();
        },
        async upsert(table, row) {
            const url = `${SUB_URL}/rest/v1/${table}`;
            const r = await fetch(url, {
                method: "POST",
                headers: { ...this.headers, "Prefer": "resolution=merge-duplicates,return=minimal" },
                body: JSON.stringify(row)
            });
            if (!r.ok) throw new Error(await r.text());
        },
        async delete(table, id) {
            const url = `${SUB_URL}/rest/v1/${table}?id=eq.${id}`;
            const r = await fetch(url, {
                method: "DELETE",
                headers: this.headers
            });
            if (!r.ok) throw new Error(await r.text());
        }
    };

    // 默认提示词
    const DEFAULT_PROMPTS = {

Please extract difficult words or phrases from the text I provide (select the 8 most important if more than 8).

Format according to the example:
① meticulous [məˈtɪkjələs] adj.

Example: He is meticulous about his personal appearance.
Original Trans: 研究人员在记录每一件文物时都非常细心。
Example Trans: 他对自己个人的仪表非常讲究。`,
        ja: `私の日本語レベル：【N2/N1】
提供したテキストから、私にとって難しい単語や表現を抽出してください（8つを超える場合は最も重要な8つを選んでください）。

例の形式に従って整理してください：

    let session = { queue: [], currentIndex: 0, phase: 'PREVIEW', lastInput: '' };

    // --- 核心逻辑封装 (供键盘和按钮共用) ---
    async function handleNext() {
        if (session.currentIndex >= session.queue.length) return;

        // 新增：移动端跳过输入赋值（因为没有输入框）
        const isMobile = window.innerWidth <= 768;
        if (!isMobile) { // 仅PC端处理输入值
            if (session.phase === 'GEN_PROMPT' || session.phase === 'ORIG_PROMPT') {
                const input = document.getElementById('q-input');
                session.lastInput = input ? input.value : '';
            }
        }

        // 保留原有的阶段切换逻辑（完全不变）
        const p = session.phase;
        if(p==='PREVIEW') session.phase='GEN_PROMPT';
        else if(p==='GEN_PROMPT') session.phase='GEN_VERIFY';
        else if(p==='GEN_VERIFY') session.phase='ORIG_PROMPT';
        else if(p==='ORIG_PROMPT') session.phase='ORIG_VERIFY';
        else { 
            finishWord(); 
            session.currentIndex++; 
            session.phase='PREVIEW'; 
            session.lastInput = ''; 
        }
        renderQuiz();
    }

    function handleRetry() {
        if (session.phase === 'GEN_VERIFY' || session.phase === 'ORIG_VERIFY') {
            session.phase = 'PREVIEW';
            renderQuiz();
        }
    }

    async function handleDelete() {
        const w = session.queue[session.currentIndex];
        if(w && confirm(t('deleteConfirm'))) {

            save();
            session.currentIndex++; 
            session.phase='PREVIEW'; 
            renderQuiz(); 
        }
    }

    // --- 同步单词到云端 ---
    async function syncWordToCloud(wordObj) {
        try {
            const tableName = detectWordLanguage(wordObj.word) === 'ja' ? 'vocab_gois' : 'vocab_words';
            await DB.upsert(tableName, {
                id: wordObj.id, 
                user_id: '00000000-0000-0000-0000-000000000000',
                word: wordObj.word, 
                orig_jp: wordObj.origJP, 
                gen_jp: wordObj.genJP,
                orig_cn: wordObj.origCN, 
                gen_cn: wordObj.genCN, 
                status: wordObj.status,
                next_time: wordObj.nextTime ? new Date(wordObj.nextTime).toISOString() : new Date().toISOString(),
                review_count: wordObj.count || 0, 
                deleted: wordObj.deleted || false
            });
        } catch(e) { console.error("同步失败:", e); }
    }

                ...w,

                genJP: w.gen_jp,

    function getDiffHtml(userInput, targetText) {
        if(!userInput) return '<span style="color:#ccc">' + t('noInput') + '</span>';
        let html = '';
        for (let i = 0; i < userInput.length; i++) {
            const uChar = userInput[i];
            const tChar = targetText[i];
            if (!tChar || uChar.toLowerCase() !== tChar.toLowerCase()) {
                html += `<span class="diff-wrong">${uChar}</span>`;
            } else {
                html += `<span class="diff-normal">${uChar}</span>`;
            }
        }
        return html;
    }

    function renderQuiz() {
        const container = document.getElementById('quiz-card');
        if (session.currentIndex >= session.queue.length) {
            container.innerHTML = `<div style="text-align:center"><h2>${t('completed')}</h2></div>`;
            return;
        }
        const word = session.queue[session.currentIndex];
        const isMobile = window.innerWidth <= 768;
        let html = `<div class="word-title">${word.word}</div>`;

        switch(session.phase) {
            case 'PREVIEW':
                html += `<span class="phase-tag" style="background:#95a5a6">${t('phasePreview')}</span>
                         <div class="preview-box"><b>${t('context')}</b> ${word.origJP}</div>
                         <div class="preview-box"><b>${t('usage')}</b> ${word.genJP}</div>`;
                break;
            case 'GEN_PROMPT':
                html += `<span class="phase-tag">${t('phaseRecallUsage')}</span><div class="quiz-prompt">${word.genCN}</div>`;
                if (!isMobile) {
                    html += `<input type="text" id="q-input" placeholder="${t('placeholderGen')}" autofocus style="width:100%; padding:15px; font-size:18px; box-sizing:border-box;">`;
                }
                break;
            case 'GEN_VERIFY':
                html += `<span class="phase-tag">${t('phaseVerify')}</span>
                         <div class="diff-container">${getDiffHtml(session.lastInput, word.genJP)}</div>
                         <div class="answer-reveal"><b>${word.genJP}</b><br>${word.genCN}</div>`;
                break;
            case 'ORIG_PROMPT':
                html += `<span class="phase-tag">${t('phaseRecallContext')}</span><div class="quiz-prompt">${word.origCN}</div>`;
                if (!isMobile) {
                    html += `<input type="text" id="q-input" placeholder="${t('placeholderOrig')}" autofocus style="width:100%; padding:15px; font-size:18px; box-sizing:border-box;">`;
                }
                break;
            case 'ORIG_VERIFY':
                html += `<span class="phase-tag">${t('phaseVerify')}</span>
                         <div class="diff-container">${getDiffHtml(session.lastInput, word.origJP)}</div>
                         <div class="answer-reveal"><b>${word.origJP}</b><br>${word.origCN}</div>`;
                break;
        }

        html += `<div id="quick-edit" class="hidden" style="margin-top:20px; border-top:1px dashed #ccc; padding-top:15px;">
            <input type="text" id="edit-word" value="${word.word}">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                <input type="text" id="edit-genJP" value="${word.genJP}">
                <input type="text" id="edit-genCN" value="${word.genCN}">
                <input type="text" id="edit-origJP" value="${word.origJP}">
                <input type="text" id="edit-origCN" value="${word.origCN}">
            </div>
            <button class="btn-action btn-primary" style="width:100%" onclick="saveQuickEdit()">${t('saved')}</button>
        </div>`;
        container.innerHTML = html;
        if(!isMobile && document.getElementById('q-input')) document.getElementById('q-input').focus();
    }

    // --- 快捷键监听器 ---
    window.addEventListener('keydown', async (e) => {
        if (e.target.id && e.target.id.startsWith('edit-')) {
            if(e.key === 'Enter') saveQuickEdit();
            return;
        }
        if (e.key === 'Tab') { e.preventDefault(); handleEdit(); return; }
        
        if (!document.getElementById('panel-learn').classList.contains('hidden')) {
            if (e.key === 'Enter') { e.preventDefault(); handleNext(); }
            if (e.key === 'Delete') { handleDelete(); }
        }
    });

    // --- 业务功能函数 (导入/导出/库管理) ---
    function prepareSession() {
        const now = Date.now();
        const news = words.filter(w => !w.deleted && w.status === 'new').slice(0, Math.max(0, settings.new - dailyLog.new));
        const revs = words.filter(w => !w.deleted && w.status === 'review' && w.nextTime <= now).slice(0, Math.max(0, settings.rev - dailyLog.rev));
        const rels = words.filter(w => !w.deleted && w.status === 'relearn' && w.nextTime <= now).slice(0, Math.max(0, settings.rel - dailyLog.rel));
        session.queue = [...news, ...revs, ...rels];
    }

    // 显示导入确认对话框
    function showImportConfirm() {
        const text = document.getElementById('import-area').value;
        const blocks = text.split(/\n(?=[①-⑩])/);
        
        pendingImportWords = [];
        
        for (const block of blocks) {
            const lines = block.split('\n').map(l => l.trim());
            let w = { id: crypto.randomUUID(), status: 'new', deleted: false, count: 0, nextTime: Date.now() };
            lines.forEach(l => {
                if (l.match(/^[①-⑩]/)) { let m = l.match(/^[①-⑩]\s*(.+)$/); if (m) w.word = m[1].trim(); }
                if (l.startsWith('原句：') || l.startsWith('原文：')) w.origJP = l.replace(/原[句文]：/, '').trim();
                if (l.startsWith('例句：')) w.genJP = l.replace('例句：', '').trim();
                if (l.startsWith('原句翻译：') || l.startsWith('原文訳：')) w.origCN = l.replace(/原[句文]翻[译訳]：/, '').trim();
                if (l.startsWith('例句翻译：') || l.startsWith('例文訳：')) w.genCN = l.replace(/例[句文]翻[译訳]：/, '').trim();
            });
            if (w.word) pendingImportWords.push(w);
        }
        
        if (pendingImportWords.length === 0) {
            alert(currentLang === 'ja' ? '単語が見つかりませんでした' : 'No words found');
            return;
        }
        
        // 统计语言分布
        let jaCount = 0, enCount = 0;
        pendingImportWords.forEach(w => {
            if (detectWordLanguage(w.word) === 'ja') jaCount++;
            else enCount++;
        });
        
        // 更新确认对话框
        document.getElementById('confirm-ja-count').textContent = jaCount + (currentLang === 'ja' ? ' 個' : ' words');
        document.getElementById('confirm-en-count').textContent = enCount + (currentLang === 'ja' ? ' 個' : ' words');
        document.getElementById('confirm-total-count').textContent = pendingImportWords.length + (currentLang === 'ja' ? ' 個' : ' words');
        
        // 显示对话框
        document.getElementById('import-confirm-modal').classList.add('show');
    }
    
    // 隐藏导入确认对话框
    function hideImportConfirm() {
        document.getElementById('import-confirm-modal').classList.remove('show');
        pendingImportWords = [];
    }
    
    // 确认导入
    async function confirmImport() {
        document.getElementById('import-confirm-modal').classList.remove('show');
        
        if (pendingImportWords.length === 0) return;
        
        // 根据语言分别保存到对应表
        for (let w of pendingImportWords) {
            words.push(w);
            await syncWordToCloud(w);
        }
        
        save();
        document.getElementById('import-area').value = '';
        pendingImportWords = [];
        prepareSession();
        showPanel('learn');
    }

        document.getElementById('stat-rel').innerText = `${dailyLog.rel}/${settings.rel}`;

    function finishWord() {
        const w = session.queue[session.currentIndex]; 
        const now = Date.now();
        if (w.status === 'new') { w.status = 'review'; w.nextTime = now + 86400000; dailyLog.new++; }
        else if (w.status === 'review') { w.status = 'relearn'; w.count = 1; w.nextTime = now + 86400000; dailyLog.rev++; }
        else { w.count++; w.nextTime = now + (Math.pow(2, w.count)*86400000); dailyLog.rel++; if(w.count>=7) w.status='mastered'; }
        save(); syncWordToCloud(w);
    }

    function saveQuickEdit() {
        const w = session.queue[session.currentIndex];
        w.word = document.getElementById('edit-word').value; 
        w.genJP = document.getElementById('edit-genJP').value;
        w.genCN = document.getElementById('edit-genCN').value; 
        w.origJP = document.getElementById('edit-origJP').value;
        w.origCN = document.getElementById('edit-origCN').value; 
        save(); syncWordToCloud(w); renderQuiz();
    }

    function exportData() {
        const blob = new Blob([JSON.stringify({words, settings}, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); 
        a.href = URL.createObjectURL(blob);
        a.download = `${currentLang === 'ja' ? 'Ja' : 'En'}_Library_${new Date().toLocaleDateString()}.json`; 
        a.click();
    }
    
    function importData(event) {
        const reader = new FileReader(); 
        reader.onload = (e) => { 
            const d = JSON.parse(e.target.result); 
            words = d.words || []; 
            save(); 
            location.reload(); 
        };
        reader.readAsText(event.target.files[0]);
    }
    
    function clearAllData() { 
        if(confirm(t('clearConfirm'))) { 
            words = []; 
            save(); 
            location.reload(); 
        } 
    }
    
    async function savePrompt() { 
        await savePromptToCloud();
    }
    
    function copyPrompt(e) { 
        document.getElementById('prompt-content').select(); 
        document.execCommand('copy'); 
        e.target.innerText = t('copied'); 
        setTimeout(() => { 
            e.target.innerText = t('btnCopy'); 
        }, 1500); 
    }

    init();
</script>
</body>
</html>
